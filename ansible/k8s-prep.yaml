---
- name: Prepare Ubuntu VMs for Kubernetes
  hosts: k8s_cluster
  become: yes
  tasks:

    - name: 1. Set hostname based on inventory name
      hostname:
        name: "{{ inventory_hostname }}"

    - name: 2. Disable UFW (Ubuntu Firewall)
      ufw:
        state: disabled

    - name: 3. Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: 4. Disable swap permanently in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: 5. Ensure required kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: 6. Make kernel modules persistent on reboot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: 7. Configure sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'net.ipv4.ip_forward', value: '1' }